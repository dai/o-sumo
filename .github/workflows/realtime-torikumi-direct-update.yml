name: Realtime Torikumi Direct Update

on:
  schedule:
    # JST 13:00-18:50, every 10 minutes (cron uses UTC).
    - cron: '*/10 4-8 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: osumo-result-direct-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-torikumi:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate torikumi data
        shell: bash
        run: |
          bash scripts/ci/run_torikumi_generator.sh \
            --torikumi-only \
            --torikumi-scope result \
            --skip-rikishi-fetch \
            --strict-torikumi-fetch

      - name: Validate torikumi payload
        shell: bash
        run: python scripts/ci/validate_torikumi.py

      - name: Commit realtime torikumi data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          xargs -a scripts/ci/torikumi_paths.txt -I {} git add {}

          if git diff --cached --quiet; then
            echo "No realtime torikumi changes to commit."
            exit 0
          fi

          git commit -m "chore: realtime torikumi update"
          git push
