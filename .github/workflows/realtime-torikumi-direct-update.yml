name: Realtime Torikumi Direct Update

on:
  schedule:
    # JST 13:00-18:50, every 10 minutes (cron uses UTC).
    - cron: '*/10 4-8 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: osumo-result-direct-update
  cancel-in-progress: false

permissions:
  contents: write

# Discord 通知 (任意): secrets.DISCORD_WEBHOOK_URL が無いと wf はそのまま動く。

jobs:
  update-torikumi:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate torikumi data
        id: generate
        shell: bash
        run: |
          bash scripts/ci/run_torikumi_generator.sh \
            --torikumi-only \
            --torikumi-scope result \
            --skip-rikishi-fetch \
            --strict-torikumi-fetch

      - name: Validate torikumi payload
        id: validate
        shell: bash
        run: python scripts/ci/validate_torikumi.py

      - name: Commit realtime torikumi data
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          xargs -a scripts/ci/torikumi_paths.txt -I {} git add {}

          if git diff --cached --quiet; then
            echo "::notice::No realtime torikumi changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "committed=true" >> "$GITHUB_OUTPUT"
          git commit -m "chore: realtime torikumi update"

          # Retry push with rebase to handle non-fast-forward rejections.
          for attempt in 1 2 3; do
            if git push; then
              break
            elif [ "$attempt" -lt 3 ]; then
              echo "::warning::Push rejected (attempt ${attempt}), rebasing on remote and retrying..."
              git pull --rebase
            else
              echo "Push failed after 3 attempts."
              exit 1
            fi
          done

      - name: Write run summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Realtime Torikumi Direct Update"
            echo ""
            echo "| Step | Result |"
            echo "| --- | --- |"
            echo "| Generate | ${{ steps.generate.outcome }} |"
            echo "| Validate | ${{ steps.validate.outcome }} |"
            echo "| Commit | ${{ steps.commit.outcome }} |"
            echo "| Committed | ${{ steps.commit.outputs.committed }} |"
            echo ""
            echo "- event: \`${{ github.event_name }}\`"
            echo "- schedule: \`${{ github.event.schedule || 'manual' }}\`"
            echo "- jst_now: \`$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')\`"
            echo "- run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: failure
          TITLE: 'Realtime Torikumi Direct Update failed'
          DETAIL: |
            - event: `${{ github.event_name }}`
            - schedule: `${{ github.event.schedule || 'manual' }}`
            - run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          bash scripts/ci/notify_discord.sh "${STATUS}" "${TITLE}" "${DETAIL}" || echo "::warning::notify_discord failed"
