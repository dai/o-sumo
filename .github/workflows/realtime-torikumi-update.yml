name: Realtime Torikumi Update

on:
  schedule:
    - cron: '0,30 6-10 * * *' # 15:00-19:30 JST
    - cron: '0 11 * * *' # 20:00 JST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-torikumi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate torikumi data
        run: python scripts/update_sumo_data.py --torikumi-only --torikumi-scope result

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: realtime torikumi update"
          title: "chore: realtime torikumi update"
          body: |
            Automated torikumi refresh during live coverage hours.
            - Runs every 30 minutes from 15:00 JST to 20:00 JST
            - Refreshes torikumi result archive for all 15 days
            - Preserves torikumi schedule archive between 10:00 / 18:00 schedule updates
            - Refreshes torikumi API JSON under public/api/v1
          branch: codex/realtime-torikumi-update
          delete-branch: true
          add-paths: |
            app/lib/torikumi-data.ts
            public/api/v1/torikumi.json

      - name: Enable auto-merge for update PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash
