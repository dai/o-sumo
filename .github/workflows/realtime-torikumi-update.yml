name: Realtime Torikumi Update

on:
  schedule:
    # Target (JST): 14:00-16:30 every 30 minutes, then 17:00-17:50 every 10 minutes, then 18:00.
    #
    # Note: Scheduled runs have been observed to start ~3 hours later than their cron's intended UTC time.
    # To make the update reliable whether GitHub schedule starts on-time or late, we include:
    # - The intended UTC window for the JST target, AND
    # - A -3h shifted window (historical late-start compensation).
    #
    # If the "late start" behavior changes again, the intended window still keeps the app updating.
    - cron: '0,30 5-7 * * *'
    - cron: '0,10,20,30,40,50 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0,30 2-4 * * *'
    - cron: '0,10,20,30,40,50 5 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: osumo-main-data-refresh-realtime
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-torikumi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync with origin/main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate torikumi and banzuke data
        run: python scripts/update_sumo_data.py --torikumi-scope result --skip-rikishi-fetch

      - name: Print run context and torikumi timestamps
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "jst_now=$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')"
          python - <<'PY'
          import json
          from pathlib import Path

          torikumi = json.loads(Path("public/api/v1/torikumi.json").read_text(encoding="utf-8"))
          print(f"updatedAt={torikumi.get('updatedAt', '')}")
          print(f"resultUpdatedAt={torikumi.get('resultUpdatedAt', '')}")
          print(f"scheduleUpdatedAt={torikumi.get('scheduleUpdatedAt', '')}")
          PY

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git add app/lib/sumo-data.ts app/lib/torikumi-data.ts public/api/v1/banzuke.json public/api/v1/torikumi.json
            if git diff --staged --quiet; then
              echo "No changes to commit."
              exit 0
            fi

            git commit -m "chore: realtime torikumi update"
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push failed (attempt ${attempt}/3). Refreshing from origin/main and retrying..."
            git fetch origin main
            git reset --hard origin/main
            python scripts/update_sumo_data.py --torikumi-scope result --skip-rikishi-fetch
          done

          echo "Push failed after 3 attempts."
          exit 1
