name: Realtime Torikumi Update

on:
  schedule:
    # UTC: 06:10, 06:40, 07:10, 07:40 (= JST: 15:10, 15:40, 16:10, 16:40)
    - cron: '10,40 6-7 * * *'
    # UTC: 08:10, 08:40 (= JST: 17:10, 17:40)
    - cron: '10,40 8 * * *'
    # UTC: 09:10 (= JST: 18:10)
    - cron: '10 9 * * *'
    # UTC: 10:10 (= JST: 19:10, catches day 6+ results published after 18:00)
    - cron: '10 10 * * *'
    # UTC: 11:10 (= JST: 20:10, catches late-published day 6 results)
    - cron: '10 11 * * *'
    # UTC: 11:40 (= JST: 20:40 monitor, warn if resultUpdatedAt is not today)
    - cron: '40 11 * * *'
  workflow_dispatch:

concurrency:
  group: osumo-main-data-refresh

permissions:
  contents: write

jobs:
  update-torikumi:
    # Exclude monitor slot only (UTC 11:40 = JST 20:40)
    if: ${{ github.event_name != 'schedule' || github.event.schedule != '40 11 * * *' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate torikumi and banzuke data
        run: python scripts/update_sumo_data.py --torikumi-scope all --skip-rikishi-fetch

      - name: Print run context and torikumi timestamps
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "jst_now=$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')"
          python - <<'PY'
          import json
          from pathlib import Path

          torikumi = json.loads(Path("public/api/v1/torikumi.json").read_text(encoding="utf-8"))
          print(f"updatedAt={torikumi.get('updatedAt', '')}")
          print(f"resultUpdatedAt={torikumi.get('resultUpdatedAt', '')}")
          print(f"scheduleUpdatedAt={torikumi.get('scheduleUpdatedAt', '')}")
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/sumo-data.ts app/lib/torikumi-data.ts public/api/v1/banzuke.json public/api/v1/torikumi.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: realtime torikumi update"
            git push origin HEAD:main
          fi

  monitor-result-freshness:
    # Monitor slot only (UTC 11:40 = JST 20:40)
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '40 11 * * *' }}
    runs-on: ubuntu-latest
    steps:
      - name: Print monitor context and check result freshness
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "jst_now=$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')"
          python - <<'PY'
          import json
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          now_jst = datetime.now(ZoneInfo("Asia/Tokyo"))
          request = Request(
              "https://osada.us/api/v1/torikumi.json",
              headers={
                  "User-Agent": "o-sumo-realtime-monitor/1.0",
                  "Accept": "application/json",
              },
          )
          try:
              with urlopen(request, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
          except (HTTPError, URLError, TimeoutError) as exc:
              print(f"::warning::torikumi monitor fetch failed ({exc}); skipping freshness check")
              raise SystemExit(0)

          result_updated_at = str(payload.get("resultUpdatedAt", ""))
          schedule_updated_at = str(payload.get("scheduleUpdatedAt", ""))
          print(f"api_resultUpdatedAt={result_updated_at}")
          print(f"api_scheduleUpdatedAt={schedule_updated_at}")

          result_date = result_updated_at[:10] if result_updated_at else ""
          today_jst = now_jst.date().isoformat()
          if result_date != today_jst:
              print(
                  "::warning::resultUpdatedAt is not today in JST "
                  f"(today={today_jst}, resultUpdatedAt={result_updated_at})"
              )
          PY
