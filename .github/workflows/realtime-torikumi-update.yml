name: Realtime Torikumi Update

on:
  # schedule:
  #   - cron: '0,30 6-10 * * *' # 15:00-19:30 JST
  #   - cron: '0 11 * * *' # 20:00 JST
  # 5/1 まで定期更新は停止（手動実行のみ）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-torikumi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate torikumi data
        run: python scripts/update_sumo_data.py --torikumi-only --torikumi-scope result

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/torikumi-data.ts public/api/v1/torikumi.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: realtime torikumi update"
            git push origin HEAD:main
          fi
