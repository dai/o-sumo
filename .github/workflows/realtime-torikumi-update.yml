name: Realtime Torikumi Update

on:
  schedule:
    # JST 13:00-18:00, every 10 minutes
    - cron: '*/10 4-8 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: osumo-data-update-branch
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-torikumi:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate torikumi data
        shell: bash
        run: |
          set -euo pipefail
          success=0
          for attempt in 1 2; do
            if python scripts/update_sumo_data.py --torikumi-only --torikumi-scope result --skip-rikishi-fetch --strict-torikumi-fetch; then
              success=1
              break
            fi

            if [ "$attempt" -lt 2 ]; then
              echo "Generate torikumi data failed (attempt ${attempt}/2). Retrying..."
              sleep 10
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "Generate torikumi data failed after 2 attempts."
            exit 1
          fi

      - name: Print run context and torikumi timestamps
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "jst_now=$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')"
          python - <<'PY'
          import json
          from pathlib import Path

          torikumi = json.loads(Path("public/api/v1/torikumi.json").read_text(encoding="utf-8"))
          print(f"updatedAt={torikumi.get('updatedAt', '')}")
          print(f"resultUpdatedAt={torikumi.get('resultUpdatedAt', '')}")
          print(f"scheduleUpdatedAt={torikumi.get('scheduleUpdatedAt', '')}")
          PY

      - name: Validate torikumi payload
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          torikumi = json.loads(Path("public/api/v1/torikumi.json").read_text(encoding="utf-8"))
          required = ("updatedAt", "resultUpdatedAt", "scheduleUpdatedAt", "resultDays", "scheduleDays")
          missing = [key for key in required if key not in torikumi]
          if missing:
              raise SystemExit(f"missing keys in torikumi.json: {missing}")

          if not (torikumi["updatedAt"] and torikumi["resultUpdatedAt"] and torikumi["scheduleUpdatedAt"]):
              raise SystemExit("torikumi timestamps must be non-empty")

          if len(torikumi["resultDays"]) != 15 or len(torikumi["scheduleDays"]) != 15:
              raise SystemExit("torikumi archive day count must be 15 for resultDays and scheduleDays")
          PY

      - name: Create or update data update PR
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          branch: automation/data-updates
          base: main
          delete-branch: false
          commit-message: 'chore: realtime torikumi update'
          title: 'chore: automated sumo data updates'
          body: |
            ## Summary
            - Automated data update from `${{ github.workflow }}`
            - Event: `${{ github.event_name }}`
            - Schedule: `${{ github.event.schedule || 'manual' }}`
            - Scope: `result` (realtime)
          labels: |
            automated
            data-update
          add-paths: |
            app/lib/sumo-data.ts
            app/lib/torikumi-data.ts
            public/api/v1/banzuke.json
            public/api/v1/torikumi.json

      - name: Print PR context
        shell: bash
        run: |
          echo "pull_request_number=${{ steps.create-pr.outputs.pull-request-number }}"
          echo "pull_request_operation=${{ steps.create-pr.outputs.pull-request-operation }}"
          echo "pull_request_url=${{ steps.create-pr.outputs.pull-request-url }}"
