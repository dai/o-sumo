name: Realtime Torikumi Update

on:
  schedule:
    # JST 14:00, 15:00, 16:00, 17:00, 18:00 = UTC 05:00, 06:00, 07:00, 08:00, 09:00
    - cron: '0 5,6,7,8,9 * * *'
    # JST 17:30 = UTC 08:30
    - cron: '30 8 * * *'
  workflow_dispatch:

concurrency:
  group: osumo-main-data-refresh

permissions:
  contents: write

jobs:
  update-torikumi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate torikumi data
        run: python scripts/update_sumo_data.py --torikumi-only --torikumi-scope result

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/torikumi-data.ts public/api/v1/torikumi.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: realtime torikumi update"
            git push origin HEAD:main
          fi
