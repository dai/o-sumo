name: Daily Sumo Data Update

on:
  workflow_dispatch:

concurrency:
  group: osumo-main-data-refresh-daily
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync with origin/main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate data
        run: python scripts/update_sumo_data.py --torikumi-only --torikumi-scope schedule

      - name: Print run context and torikumi timestamps
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "jst_now=$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')"
          python - <<'PY'
          import json
          from pathlib import Path

          torikumi = json.loads(Path("public/api/v1/torikumi.json").read_text(encoding="utf-8"))
          print(f"updatedAt={torikumi.get('updatedAt', '')}")
          print(f"resultUpdatedAt={torikumi.get('resultUpdatedAt', '')}")
          print(f"scheduleUpdatedAt={torikumi.get('scheduleUpdatedAt', '')}")
          PY

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git add app/lib/torikumi-data.ts public/api/v1/torikumi.json
            if git diff --staged --quiet; then
              echo "No changes to commit."
              exit 0
            fi

            git commit -m "chore: daily sumo data update"
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push failed (attempt ${attempt}/3). Refreshing from origin/main and retrying..."
            git fetch origin main
            git reset --hard origin/main
            python scripts/update_sumo_data.py --torikumi-only --torikumi-scope schedule
          done

          echo "Push failed after 3 attempts."
          exit 1
