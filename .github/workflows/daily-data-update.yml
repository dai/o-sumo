name: Daily Sumo Data Update

on:
  schedule:
    - cron: '0 1,9 * * *' # 10:00 JST / 18:00 JST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate data
        run: python scripts/update_sumo_data.py --torikumi-scope schedule

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: daily sumo data update"
          title: "chore: daily sumo data update"
          body: |
            Automated schedule-oriented update at 10:00 JST and 18:00 JST.
            - Refresh banzuke (幕内42 / 十両28 strict validation)
            - Refresh torikumi schedule archive (初日から千秋楽まで15日分)
            - Preserve torikumi result archive between live result updates
            - Refresh API JSON under public/api/v1
          branch: codex/daily-sumo-data-update
          delete-branch: true
          add-paths: |
            app/lib/sumo-data.ts
            app/lib/torikumi-data.ts
            public/api/v1/banzuke.json
            public/api/v1/torikumi.json

      - name: Enable auto-merge for update PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash
