name: Daily Sumo Data Update

on:
  schedule:
    # JST 13:00 / 19:00 (cron uses UTC).
    - cron: '0 4,10 * * *'
  workflow_dispatch:

concurrency:
  group: osumo-schedule-update-branch
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate schedule data
        shell: bash
        run: |
          bash scripts/ci/run_torikumi_generator.sh \
            --torikumi-only \
            --torikumi-scope schedule

      - name: Print run context and torikumi timestamps
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "jst_now=$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')"
          python - <<'PY'
          import json
          from pathlib import Path

          torikumi = json.loads(Path("public/api/v1/torikumi.json").read_text(encoding="utf-8"))
          print(f"updatedAt={torikumi.get('updatedAt', '')}")
          print(f"resultUpdatedAt={torikumi.get('resultUpdatedAt', '')}")
          print(f"scheduleUpdatedAt={torikumi.get('scheduleUpdatedAt', '')}")
          PY

      - name: Validate torikumi payload
        shell: bash
        run: python scripts/ci/validate_torikumi.py

      - name: Create or update data update PR
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          branch: automation/schedule-updates
          branch-suffix: timestamp
          base: main
          delete-branch: false
          commit-message: 'chore: daily sumo schedule update'
          title: 'chore: automated torikumi schedule updates'
          body: |
            ## Summary
            - Automated data update from `${{ github.workflow }}`
            - Event: `${{ github.event_name }}`
            - Schedule: `${{ github.event.schedule || 'manual' }}`
            - Scope: `schedule`
          labels: |
            automated
            data-update
          add-paths: |
            app/lib/torikumi-data.ts
            public/api/v1/torikumi.json

      - name: Print PR context
        shell: bash
        run: |
          echo "pull_request_number=${{ steps.create-pr.outputs.pull-request-number }}"
          echo "pull_request_operation=${{ steps.create-pr.outputs.pull-request-operation }}"
          echo "pull_request_url=${{ steps.create-pr.outputs.pull-request-url }}"
