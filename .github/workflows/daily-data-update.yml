name: Daily Sumo Data Update

on:
  schedule:
    - cron: '0 10 * * *' # 19:00 JST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate data
        run: python scripts/update_sumo_data.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: daily sumo data update"
          title: "chore: daily sumo data update"
          body: |
            Automated daily update at 19:00 JST.
            - Refresh banzuke (幕内42 / 十両28 strict validation)
            - Refresh torikumi result archive (初日から当日まで)
            - Refresh torikumi schedule archive (初日から翌日まで)
            - Refresh API JSON under public/api/v1
          branch: codex/daily-sumo-data-update
          delete-branch: true
          add-paths: |
            app/lib/sumo-data.ts
            app/lib/torikumi-data.ts
            public/api/v1/banzuke.json
            public/api/v1/torikumi.json
