name: Daily Sumo Data Update

on:
  schedule:
    - cron: '30 3 * * *'
    - cron: '30 6 * * *'
    - cron: '0 8 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

concurrency:
  group: osumo-data-update-branch
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate data
        shell: bash
        run: |
          set -euo pipefail
          success=0
          for attempt in 1 2; do
            if python scripts/update_sumo_data.py --torikumi-only --torikumi-scope schedule; then
              success=1
              break
            fi

            if [ "$attempt" -lt 2 ]; then
              echo "Generate data failed (attempt ${attempt}/2). Retrying..."
              sleep 10
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "Generate data failed after 2 attempts."
            exit 1
          fi

      - name: Update news feed
        shell: bash
        run: |
          set -euo pipefail
          success=0
          for attempt in 1 2; do
            if python scripts/update_news_feed.py; then
              success=1
              break
            fi

            if [ "$attempt" -lt 2 ]; then
              echo "Update news feed failed (attempt ${attempt}/2). Retrying..."
              sleep 10
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "Update news feed failed after 2 attempts."
            exit 1
          fi

      - name: Print run context and torikumi timestamps
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "jst_now=$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')"
          python - <<'PY'
          import json
          from pathlib import Path

          torikumi = json.loads(Path("public/api/v1/torikumi.json").read_text(encoding="utf-8"))
          print(f"updatedAt={torikumi.get('updatedAt', '')}")
          print(f"resultUpdatedAt={torikumi.get('resultUpdatedAt', '')}")
          print(f"scheduleUpdatedAt={torikumi.get('scheduleUpdatedAt', '')}")

          news = json.loads(Path("public/api/v1/news.json").read_text(encoding="utf-8"))
          print(f"news_updatedAt={news.get('updatedAt', '')}")
          print(f"news_item_count={len(news.get('items', []))}")
          for source in news.get('sources', []):
              print(f"news_source={source.get('id')} ok={source.get('ok')} count={source.get('count', 0)}")
          PY

      - name: Generate unique branch name
        id: branch-name
        shell: bash
        run: |
          ts=$(date -u +%Y%m%d-%H%M%S)
          name="automation/data-updates-${ts}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Create or update data update PR
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch-name.outputs.name }}
          base: main
          delete-branch: true
          commit-message: 'chore: daily sumo data update'
          title: 'chore: automated sumo data updates (${{ steps.branch-name.outputs.name }})'
          body: |
            ## Summary
            - Automated data update from `${{ github.workflow }}`
            - Event: `${{ github.event_name }}`
            - Schedule: `${{ github.event.schedule || 'manual' }}`
            - Branch: `${{ steps.branch-name.outputs.name }}`
            - Scope: `schedule` (daily) + news feed
          labels: |
            automated
            data-update
          add-paths: |
            app/lib/torikumi-data.ts
            public/api/v1/torikumi.json
            public/api/v1/news.json

      - name: Enable auto-merge on the new PR
        if: steps.create-pr.outputs.pull-request-operation == 'created'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
        run: |
          if [ -z "$PR_URL" ]; then
            echo "No PR URL returned, skipping auto-merge"
            exit 0
          fi
          gh pr merge --auto --squash "$PR_URL"

      - name: Trigger pull_request_target synchronize event
        if: steps.create-pr.outputs.pull-request-operation == 'created'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
        run: |
          set -euo pipefail
          if [ -z "$PR_URL" ]; then
            echo "No PR URL returned, skipping synchronize trigger"
            exit 0
          fi

          PR_NUMBER=$(gh pr view "$PR_URL" --json number --jq .number)
          HEAD_REF=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)

          # Fetch the current commit so we can reuse its tree SHA for an empty commit.
          head_commit=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/commits/${HEAD_SHA}")
          tree_sha=$(printf '%s' "$head_commit" | jq -r .tree.sha)
          echo "Appending empty commit to ${HEAD_REF} (head=${HEAD_SHA}, tree=${tree_sha})"

          new_commit=$(curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/commits" \
            -d "$(jq -n \
              --arg message "ci: trigger pull_request_target for auto-merge" \
              --arg head "$HEAD_SHA" \
              --arg tree "$tree_sha" \
              '{message: $message, parents: [$head], tree: $tree}')")
          new_sha=$(printf '%s' "$new_commit" | jq -r .sha)
          echo "Created empty commit ${new_sha}"

          curl -fsSL \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/refs/heads/${HEAD_REF}" \
            -d "$(jq -n --arg sha "$new_sha" '{sha: $sha}')" >/dev/null
          echo "Updated ${HEAD_REF} to ${new_sha}"

      - name: Print PR context
        shell: bash
        run: |
          echo "branch_name=${{ steps.branch-name.outputs.name }}"
          echo "pull_request_number=${{ steps.create-pr.outputs.pull-request-number }}"
          echo "pull_request_operation=${{ steps.create-pr.outputs.pull-request-operation }}"
          echo "pull_request_url=${{ steps.create-pr.outputs.pull-request-url }}"
