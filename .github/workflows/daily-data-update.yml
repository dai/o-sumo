name: Daily Sumo Data Update

on:
  schedule:
    # JST: 09:00, 18:00 (torikumi schedule refresh)
    - cron: '0 9,18 * * *'
      timezone: 'Asia/Tokyo'
  workflow_dispatch:

concurrency:
  group: osumo-main-data-refresh

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate data
        run: python scripts/update_sumo_data.py --torikumi-only --torikumi-scope schedule

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/torikumi-data.ts public/api/v1/torikumi.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily sumo data update"
            git push origin HEAD:main
          fi
