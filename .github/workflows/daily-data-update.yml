name: Daily Sumo Data Update

on:
  schedule:
    # JST 13:00 / 19:00 (cron uses UTC).
    - cron: '0 4,10 * * *'
  workflow_dispatch:

concurrency:
  group: osumo-schedule-update-branch
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

# Discord 通知 (任意): secrets.DISCORD_WEBHOOK_URL が無いと wf はそのまま動く。

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate schedule data
        id: generate
        shell: bash
        run: |
          bash scripts/ci/run_torikumi_generator.sh \
            --torikumi-only \
            --torikumi-scope schedule

      - name: Validate torikumi payload
        id: validate
        shell: bash
        run: python scripts/ci/validate_torikumi.py

      - name: Print torikumi timestamps
        id: inspect
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          torikumi = json.loads(Path("public/api/v1/torikumi.json").read_text(encoding="utf-8"))
          print(f"updatedAt={torikumi.get('updatedAt', '')}")
          print(f"resultUpdatedAt={torikumi.get('resultUpdatedAt', '')}")
          print(f"scheduleUpdatedAt={torikumi.get('scheduleUpdatedAt', '')}")
          PY

      - name: Create or update data update PR
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          branch: automation/schedule-updates
          branch-suffix: timestamp
          base: main
          delete-branch: false
          commit-message: 'chore: daily sumo schedule update'
          title: 'chore: automated torikumi schedule updates'
          body: |
            ## Summary
            - Automated data update from `${{ github.workflow }}`
            - Event: `${{ github.event_name }}`
            - Schedule: `${{ github.event.schedule || 'manual' }}`
            - Scope: `schedule`
          labels: |
            automated
            data-update
          add-paths: |
            app/lib/torikumi-data.ts
            public/api/v1/torikumi.json

      - name: Write run summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Daily Sumo Data Update"
            echo ""
            echo "| Step | Result |"
            echo "| --- | --- |"
            echo "| Generate | ${{ steps.generate.outcome }} |"
            echo "| Validate | ${{ steps.validate.outcome }} |"
            echo "| Create PR | ${{ steps.create-pr.outcome }} |"
            echo "| PR Number | ${{ steps.create-pr.outputs.pull-request-number }} |"
            echo "| PR Operation | ${{ steps.create-pr.outputs.pull-request-operation }} |"
            echo ""
            echo "- event: \`${{ github.event_name }}\`"
            echo "- schedule: \`${{ github.event.schedule || 'manual' }}\`"
            echo "- jst_now: \`$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')\`"
            echo "- run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: failure
          TITLE: 'Daily Sumo Data Update failed'
          DETAIL: |
            - event: `${{ github.event_name }}`
            - schedule: `${{ github.event.schedule || 'manual' }}`
            - run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          bash scripts/ci/notify_discord.sh "${STATUS}" "${TITLE}" "${DETAIL}" || echo "::warning::notify_discord failed"

