name: News Feed Update

on:
  schedule:
    # JST 09:05, 11:05, 13:05, 15:05, 17:05, 19:05
    - cron: '5 0,2,4,6,8,10 * * *'
  workflow_dispatch:

concurrency:
  group: osumo-news-update-branch
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update news feed
        shell: bash
        run: |
          set -euo pipefail
          success=0
          for attempt in 1 2; do
            if python scripts/update_news_feed.py --allow-stale-on-failure; then
              success=1
              break
            fi

            if [ "$attempt" -lt 2 ]; then
              echo "Update news feed failed (attempt ${attempt}/2). Retrying..."
              sleep 10
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "Update news feed failed after 2 attempts."
            exit 1
          fi

      - name: Print run context and news timestamps
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "jst_now=$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')"
          python - <<'PY'
          import json
          from pathlib import Path

          news = json.loads(Path("public/api/v1/news.json").read_text(encoding="utf-8"))
          print(f"news_updatedAt={news.get('updatedAt', '')}")
          print(f"news_item_count={len(news.get('items', []))}")
          for source in news.get('sources', []):
              print(f"news_source={source.get('id')} ok={source.get('ok')} count={source.get('count', 0)}")
          PY

      - name: Validate news payload
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          news = json.loads(Path("public/api/v1/news.json").read_text(encoding="utf-8"))
          required = ("updatedAt", "sources", "items")
          missing = [key for key in required if key not in news]
          if missing:
              raise SystemExit(f"missing keys in news.json: {missing}")

          sources = news.get("sources", [])
          if not sources:
              raise SystemExit("news sources must not be empty")
          if not any(source.get("ok", False) for source in sources):
              raise SystemExit("all news sources are marked as failed")
          PY

      - name: Create or update data update PR
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          branch: automation/news-updates
          base: main
          delete-branch: false
          commit-message: 'chore: news feed update'
          title: 'chore: automated news feed updates'
          body: |
            ## Summary
            - Automated data update from `${{ github.workflow }}`
            - Event: `${{ github.event_name }}`
            - Schedule: `${{ github.event.schedule || 'manual' }}`
            - Scope: `news`
          labels: |
            automated
            data-update
          add-paths: |
            public/api/v1/news.json

      - name: Print PR context
        shell: bash
        run: |
          echo "pull_request_number=${{ steps.create-pr.outputs.pull-request-number }}"
          echo "pull_request_operation=${{ steps.create-pr.outputs.pull-request-operation }}"
          echo "pull_request_url=${{ steps.create-pr.outputs.pull-request-url }}"
