name: News Feed Update

on:
  schedule:
    # JST 09:05, 11:05, 13:05, 15:05, 17:05, 19:05
    - cron: '5 0,2,4,6,8,10 * * *'
  workflow_dispatch:

concurrency:
  group: osumo-news-update-branch
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

# Discord 通知 (任意): secrets.DISCORD_WEBHOOK_URL が無いと wf はそのまま動く。

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update news feed
        id: generate
        shell: bash
        run: |
          set -euo pipefail
          success=0
          for attempt in 1 2; do
            if python scripts/update_news_feed.py --allow-stale-on-failure; then
              success=1
              break
            fi

            if [ "$attempt" -lt 2 ]; then
              echo "Update news feed failed (attempt ${attempt}/2). Retrying..."
              sleep 10
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "Update news feed failed after 2 attempts."
            exit 1
          fi

      - name: Print news feed context
        id: inspect
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "jst_now=$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')"
          python - <<'PY'
          import json
          from pathlib import Path

          news = json.loads(Path("public/api/v1/news.json").read_text(encoding="utf-8"))
          print(f"news_updatedAt={news.get('updatedAt', '')}")
          print(f"news_item_count={len(news.get('items', []))}")
          for source in news.get('sources', []):
              print(f"news_source={source.get('id')} ok={source.get('ok')} count={source.get('count', 0)}")
          PY

      - name: Validate news payload
        id: validate
        shell: bash
        run: |
          python scripts/ci/validate_news.py

      - name: Create or update data update PR
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          branch: automation/news-updates
          branch-suffix: timestamp
          base: main
          delete-branch: false
          commit-message: 'chore: news feed update'
          title: 'chore: automated news feed updates'
          body: |
            ## Summary
            - Automated data update from `${{ github.workflow }}`
            - Event: `${{ github.event_name }}`
            - Schedule: `${{ github.event.schedule || 'manual' }}`
            - Scope: `news`
          labels: |
            automated
            data-update
          add-paths: |
            public/api/v1/news.json

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PR_NUMBER}" ]; then
            echo "pull_request_number is empty; skipping auto-merge"
            exit 0
          fi
          echo "Enabling auto-merge for PR #${PR_NUMBER} (squash)"
          gh pr merge "${PR_NUMBER}" --auto --squash --delete-branch=false

      - name: Write run summary
        if: always()
        shell: bash
        run: |
          {
            echo "## News Feed Update"
            echo ""
            echo "| Step | Result |"
            echo "| --- | --- |"
            echo "| Generate | ${{ steps.generate.outcome }} |"
            echo "| Validate | ${{ steps.validate.outcome }} |"
            echo "| Create PR | ${{ steps.create-pr.outcome }} |"
            echo "| PR Number | ${{ steps.create-pr.outputs.pull-request-number }} |"
            echo "| PR Operation | ${{ steps.create-pr.outputs.pull-request-operation }} |"
            echo ""
            echo "- event: \`${{ github.event_name }}\`"
            echo "- schedule: \`${{ github.event.schedule || 'manual' }}\`"
            echo "- jst_now: \`$(TZ=Asia/Tokyo date +'%Y-%m-%dT%H:%M:%S%z')\`"
            echo "- run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: failure
          TITLE: 'News Feed Update failed'
          DETAIL: |
            - event: `${{ github.event_name }}`
            - schedule: `${{ github.event.schedule || 'manual' }}`
            - run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          bash scripts/ci/notify_discord.sh "${STATUS}" "${TITLE}" "${DETAIL}" || echo "::warning::notify_discord failed"

